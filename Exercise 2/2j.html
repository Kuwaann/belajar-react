<!DOCTYPE html>
<html>

<head>
    <title>Exercise 2</title>
</head>

<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
        function ProductDetails({ name, price, discountPrice, imageSrc }) {
            return (
                <div>
                    <img src={imageSrc} alt="" />
                    <div>
                        <p>{name}</p>
                    </div>
                    <div>
                        {discountPrice ? (
                            <p><del>Price: ${price}</del></p>
                        ) : (
                            <p>Price: ${price}</p>
                        )}

                    </div>
                    {discountPrice && (
                        <div>
                            <p>Discount Price: ${discountPrice}</p>
                        </div>
                    )}
                    <button>Add to cart</button>
                </div>
            );
        }

        function App() {
            return (
                <>
                    <ProductDetails name="Cotton Socks" price="10.90" discountPrice="5.45" imageSrc="cotton-socks.png" />
                    <ProductDetails name="Tennis Balls" price="6.00" imageSrc="tennis-balls.png" />
                    <ProductDetails name="Plain T-Shirt" price="7.99" imageSrc="plain-t-shirt.png" />
                </>
            );
        }

        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);
    </script>
</body>

</html>
