<!DOCTYPE html>
<html>

<head>
    <title>Exercise 4</title>
</head>

<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
        function App() {
            const autoClickButtonRef = React.useRef(null);
            const intervalRef = React.useRef(null);
            const [count, setCount] = React.useState(0);

            function click() {
                console.log("Clicked");
                setCount(count + 1);
            }

            function reset(){
                console.log("Count has been reset");
                setCount(0);
            }

            function autoClick(){
                if(intervalRef.current){
                    return;
                }

                intervalRef.current = setInterval(() => {
                    const element = autoClickButtonRef.current;
                    if(element){
                        element.click();
                    }
                },1000);
            }

            return (
                <>
                    <button onClick={click} ref={autoClickButtonRef}>Clicked {count} time{count !== 1 && 's'}</button>
                    <button onClick={reset}>Reset</button>
                    <button onClick={autoClick}>Auto click</button>
                </>
            )
        }

        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);
    </script>
</body>

</html>
